version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - TEMPLATE_DIR=/templates
      - TYPST_PATH=/usr/bin/typst
      - PORT=8080
    volumes:
      - ./templates:/templates:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
